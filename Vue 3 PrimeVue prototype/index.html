<html lang="en">

<title>Editorial Content Search · Vue + PrimeVue</title>

<!-- PrimeVue 4 (all components on global `PrimeVue`) -->
<script src="https://unpkg.com/primevue/umd/primevue.min.js"></script>
<!-- Aura theme preset -->
<script src="https://unpkg.com/@primeuix/themes/umd/aura.js"></script>

<link rel="stylesheet" href="https://unpkg.com/primeicons/primeicons.css" />

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root:root:root {
    /* Minera indigo ramp → recolours PrimeVue's primary palette (beats the runtime-injected :root) */
    --p-primary-50:  #F4F5FE;
    --p-primary-100: #E9EBFD;
    --p-primary-200: #D8DCFB;
    --p-primary-300: #B8C3F7;
    --p-primary-400: #8696F0;
    --p-primary-500: #3E4CE2;
    --p-primary-600: #2C38AE;
    --p-primary-700: #232E94;
    --p-primary-800: #1A247A;
    --p-primary-900: #0F1652;
    --p-primary-950: #0C0D1A;
    --p-font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;

    /* local design tokens (chrome) */
    --fg-primary:   #1A1B1C;
    --fg-secondary: #56575A;
    --fg-tertiary:  #888888;
    --stroke-bright:#E6E7EB;
    --stroke-deep:  #888888;
    --fill-base-02: #F1F2F5;
    --fill-bright:  #F1F2F5;
    --neutral-300:  #B8B9BC;
    --neutral-400:  #A1A2A5;
    --neutral-950:  #1A1B1C;
    --accent-100:   #E9EBFD;
    --accent-300:   #B8C3F7;
    --accent-500:   #3E4CE2;
    --accent-600:   #2C38AE;
    --accent-700:   #232E94;
    --green-stroke: #3FA35A;
    --red-stroke:   #CC0000;
    --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px; --radius-full: 9999px;
    --font-mono: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }
  html, body, #app { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--fill-base-02);
    color: var(--fg-primary);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }
  [v-cloak] { display: none; }
  ::selection { background: var(--accent-100); }

  /* ---------- App shell ---------- */
  .app-shell { display: grid; grid-template-columns: 56px 1fr; height: 100vh; }
  .rail {
    background: var(--neutral-950);
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 0 10px; gap: 2px;
  }
  .rail-brand {
    width: 34px; height: 34px; border-radius: var(--radius-md);
    background: var(--accent-500); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 15px; margin-bottom: 12px;
  }
  .rail-item {
    width: 38px; height: 38px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    color: var(--neutral-400); cursor: pointer; font-size: 17px;
  }
  .rail-item:hover { background: rgba(255,255,255,0.07); color: #fff; }
  .rail-item.active { background: var(--accent-500); color: #fff; }
  .rail-spacer { flex: 1; }
  .rail-badge {
    width: 30px; height: 30px; border-radius: var(--radius-sm);
    background: var(--red-stroke); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 10px; margin-top: 6px;
  }

  .main { display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  .topbar {
    height: 52px; background: #fff; border-bottom: 1px solid var(--stroke-bright);
    display: flex; align-items: center; gap: 14px; padding: 0 18px 0 24px;
  }
  .breadcrumb { display: flex; gap: 8px; align-items: center; color: var(--fg-tertiary); font-size: 13px; }
  .breadcrumb .sep { color: var(--neutral-300); display: inline-flex; font-size: 11px; }
  .breadcrumb .current { color: var(--fg-primary); font-weight: 500; }
  .topbar-spacer { flex: 1; }

  .page { flex: 1; overflow: auto; }
  .page-inner { max-width: 1120px; margin: 0 auto; padding: 32px 40px 80px; }
  .page-head { display: flex; align-items: flex-end; gap: 16px; margin-bottom: 22px; }
  .page-head h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }
  .page-head .count { color: var(--fg-tertiary); font-size: 14px; margin-top: 4px; }
  .page-head-spacer { flex: 1; }
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }

  /* DataTable trims */
  .panel .p-datatable { font-size: 14px; }
  .panel { background:#fff; border:1px solid var(--stroke-bright); border-radius: var(--radius-md); overflow:hidden; }
  .title-cell { font-weight: 500; }
  .row-actions { display: flex; gap: 2px; justify-content: flex-end; }

  /* ---------- Wizard / modal bits ---------- */
  .eyebrow { font-size: 12px; color: var(--fg-tertiary); margin-bottom: 3px; }
  .modal-title { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.018em; }
  .modal-back {
    display: inline-flex; align-items: center; gap: 7px;
    height: 28px; padding: 0 11px 0 8px; margin-bottom: 10px;
    border: 1px solid var(--stroke-bright); border-radius: var(--radius-full);
    background: #fff; cursor: pointer; font-size: 13px; color: var(--fg-secondary);
    font-weight: 500; white-space: nowrap;
  }
  .modal-back:hover { background: var(--fill-bright); color: var(--fg-primary); }
  .modal-x {
    position: absolute; top: -4px; right: -4px; width: 32px; height: 32px;
    border: none; background: transparent; border-radius: var(--radius-sm);
    cursor: pointer; color: var(--fg-tertiary); display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .modal-x:hover { background: var(--fill-bright); color: var(--fg-primary); }

  /* visuals step */
  .visual-chip {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--fill-bright); border-radius: var(--radius-full);
    padding: 5px 6px 5px 13px; font-size: 13px; font-weight: 500; color: var(--fg-secondary);
  }
  .visual-chip button {
    border: none; background: transparent; cursor: pointer; color: var(--fg-tertiary);
    display: flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 50%; font-size: 11px;
  }
  .visual-chip button:hover { background: rgba(0,0,0,0.08); color: var(--fg-primary); }
  .visual-block { margin-bottom: 22px; }
  .dropzone {
    position: relative; margin-top: 10px;
    border: 1.5px dashed #CDCED1; border-radius: var(--radius-md);
    min-height: 150px; padding: 16px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 9px;
    background: var(--fill-base-02); transition: border-color 120ms, background 120ms;
  }
  .dropzone.over { border-color: var(--accent-500); background: var(--accent-100); }
  .dropzone.filled { background: #fff; }
  .dz-btn {
    display: inline-flex; align-items: center; gap: 8px; height: 36px; padding: 0 16px;
    background: #fff; border: 1px solid var(--stroke-deep); border-radius: var(--radius-sm);
    font-weight: 500; font-size: 14px; cursor: pointer; color: var(--fg-primary);
  }
  .dz-btn:hover { background: var(--fill-base-02); }
  .dz-hint { font-size: 13px; color: var(--fg-tertiary); }
  .dz-preview { max-width: 100%; max-height: 240px; border-radius: var(--radius-sm); display: block; }
  .dz-remove {
    position: absolute; top: 8px; right: 8px; width: 28px; height: 28px;
    border: none; border-radius: var(--radius-sm); background: rgba(26,27,28,0.72); color: #fff;
    cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px;
  }
  .dz-remove:hover { background: rgba(26,27,28,0.9); }

  .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 18px; }
  .label-row { display: flex; align-items: baseline; justify-content: space-between; }
  .label-row label { font-weight: 700; font-size: 13px; }
  .req { color: var(--red-stroke); margin-left: 2px; }
  .meta-foot { display: flex; align-items: baseline; justify-content: space-between; margin-top: 2px; }
  .meta-foot .help { color: var(--fg-tertiary); font-size: 12px; white-space: nowrap; }
  .meta-foot .counter { font-family: var(--font-mono); font-size: 11px; color: var(--fg-tertiary); margin-left: 12px; }
  .meta-foot .counter.over { color: var(--red-stroke); }
  .full { width: 100%; }

  .redir-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .redir-card {
    display: flex; align-items: flex-start; gap: 11px;
    border: 1px solid var(--stroke-bright); border-radius: var(--radius-md);
    padding: 14px; cursor: pointer; background: #fff;
    transition: border-color 120ms, background 120ms;
  }
  .redir-card:hover { border-color: var(--stroke-deep); background: var(--fill-base-02); }
  .redir-card.selected { border-color: var(--accent-500); background: var(--accent-100); }
  .rc-title { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 14px; }
  .rc-desc { font-size: 12px; color: var(--fg-secondary); line-height: 1.45; margin-top: 5px; }

  .chosen {
    border: 1px solid var(--accent-300); background: var(--accent-100);
    border-radius: var(--radius-md); padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
  }
  .chosen .meta-type { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--accent-700); }
  .chosen .t { font-weight: 600; font-size: 15px; margin-top: 2px; }
  .chosen .sub { font-size: 12px; color: var(--fg-secondary); font-family: var(--font-mono); margin-top: 3px; }
  .chosen .spacer { flex: 1; }

  /* mini stepper in footer */
  .stepper { display: flex; align-items: center; }
  .stepper .node { display: flex; align-items: center; gap: 9px; }
  .stepper .dot {
    width: 26px; height: 26px; border-radius: var(--radius-full);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; font-family: var(--font-mono);
    border: 1px solid var(--stroke-bright); background: #fff; color: var(--fg-tertiary);
  }
  .stepper .node.active .dot { background: var(--accent-500); border-color: var(--accent-500); color: #fff; }
  .stepper .node.done .dot { background: var(--accent-100); border-color: var(--accent-100); color: var(--accent-600); }
  .stepper .node .lbl { font-size: 13px; color: var(--fg-tertiary); }
  .stepper .node.active .lbl { color: var(--fg-primary); font-weight: 500; }
  .stepper .bar { width: 28px; height: 1px; background: var(--stroke-bright); margin: 0 12px; }

  /* ---------- Search (Pattern D) ---------- */
  .sv-wrap { display: flex; flex-direction: column; min-height: 380px; }
  .deep-help { font-size: 12px; color: var(--fg-tertiary); margin: 12px 2px 0; line-height: 1.5; }
  .ctx-chip {
    display: inline-flex; align-items: center; gap: 9px; align-self: flex-start;
    background: var(--accent-100); border: 1px solid var(--accent-300);
    border-radius: var(--radius-full); padding: 4px 12px 4px 6px; font-size: 13px; color: var(--accent-700);
    margin-bottom: 10px; max-width: 100%;
  }
  .ctx-chip .pl { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ctx-chip .ck { font-family: var(--font-mono); font-size: 11px; color: var(--accent-600); opacity: 0.8; }

  .sv-results { margin-top: 12px; overflow-y: auto; overflow-x: hidden; max-height: 320px; }
  .res-row {
    display: flex; align-items: center; gap: 13px;
    padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer;
    border: 1px solid transparent;
  }
  .res-row:hover { background: var(--fill-base-02); }
  .res-row.selected { background: var(--accent-100); border-color: var(--accent-300); }
  .ic-box { width: 34px; height: 34px; border-radius: var(--radius-sm); background: var(--fill-bright); color: var(--fg-secondary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }
  .res-main { flex: 1; min-width: 0; }
  .res-main .t { font-weight: 500; font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .res-main .t .tx { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .res-main .sub { font-size: 12px; color: var(--fg-tertiary); font-family: var(--font-mono); margin-top: 3px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .res-main .sub .k { color: var(--neutral-400); }
  mark { background: var(--accent-300); color: var(--accent-700); border-radius: 2px; padding: 0 1px; }

  .sv-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 40px 20px; color: var(--fg-tertiary); gap: 12px;
  }
  .sv-empty .ic-circle { width: 52px; height: 52px; border-radius: var(--radius-full); background: var(--fill-bright); display: flex; align-items: center; justify-content: center; color: var(--neutral-400); font-size: 22px; }
  .sv-empty .et { font-size: 15px; font-weight: 600; color: var(--fg-secondary); }
  .sv-empty .ed { font-size: 13px; max-width: 320px; line-height: 1.5; }

  .status-dot { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--fg-secondary); flex-shrink: 0; }
  .status-dot .d { width: 7px; height: 7px; border-radius: 50%; }

  .scope-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: var(--radius-full); background: var(--fill-bright); color: var(--fg-secondary); text-transform: uppercase; letter-spacing: 0.03em; }

  .fab { position: fixed; bottom: 24px; right: 24px; z-index: 90; }

  /* PrimeVue tweaks */
  .p-dialog { border-radius: var(--radius-lg) !important; }
  .p-selectbutton { flex-wrap: wrap; }
  .p-button-label { white-space: nowrap; }
  .p-button { white-space: nowrap; }
  /* show dialog immediately — don't depend on rAF-driven enter transition */
  .p-dialog { opacity: 1 !important; transform: none !important; animation: none !important; }
  .p-dialog-mask { opacity: 1 !important; }
</style>
</head>

    case "frontspace": return { type, _id:item.id, typeLabel:"Frontspace", title:item.title, sub:item.id, status:null };
    case "program":    return { type, _id:item.id, typeLabel:"Program",    title:item.title, sub:`${item.id} · ${item.ck}`, status:item.status, poster:item.poster };
    case "season":     return { type, _id:item.id, typeLabel:"Season",     title:`${program.title} — ${item.title}`, sub:`${item.id} · ${item.status}`, status:item.status, poster:program.poster };
    case "clip":       return { type, _id:item.id, typeLabel:"Clip",       title:`${program.title} — ${item.title}`, sub:`${item.id} · ${item.dur}`, status:item.status, poster:program.poster };
  }
}

/* ---------- small presentational components ---------- */
const Poster = {
  props: { poster:String, size:{type:Number,default:26}, radius:{type:Number,default:4} },
  computed: { grad(){ const [a,b] = POSTERS[this.poster] || ["#888","#bbb"]; return `linear-gradient(140deg, ${a}, ${b})`; } },
  template: `<div :style="{ width: size+'px', height: (size*1.34)+'px', borderRadius: radius+'px', flexShrink:0, background: grad, boxShadow:'inset 0 0 0 1px rgba(0,0,0,0.08)' }"></div>`
};
const StatusDot = {
  props: { status:String },
  computed: { online(){ return this.status === "online"; } },
  template: `<span class="status-dot"><span class="d" :style="{ background: online ? 'var(--green-stroke)' : 'var(--neutral-300)' }"></span>{{ online ? 'Online' : 'Offline' }}</span>`
};
const Highlight = {
  props: { text:String, q:String },
  computed: {
    parts(){
      if(!this.q) return [{ m:false, t:this.text }];
      const i = this.text.toLowerCase().indexOf(this.q.toLowerCase());
      if(i < 0) return [{ m:false, t:this.text }];
      return [{m:false,t:this.text.slice(0,i)},{m:true,t:this.text.slice(i,i+this.q.length)},{m:false,t:this.text.slice(i+this.q.length)}];
    }
  },
  template: `<span class="tx"><template v-for="(p,i) in parts" :key="i"><mark v-if="p.m">{{ p.t }}</mark><template v-else>{{ p.t }}</template></template></span>`
};

/* ============================================================
   Root app
   ============================================================ */
const App = {
  components: { Poster, StatusDot, Highlight },
  setup() {
    const toast = PrimeVue.useToast();

    const open = ref(true);
    const step = ref(1);            // 1 Details · 2 Review
    const mode = ref("wizard");     // wizard | search
    const editorialRows = ref(EDITORIAL_ROWS);

    const form = reactive({
      title:"", pubTitle:"", subtitle:"", desc:"",
      destKind:"", externalUrl:"", ctaLabel:"Watch now", selection:null,
      visuals: [],
    });

    /* --- search state (Pattern D) --- */
    const type = ref("catalog");
    const q = ref("");
    const drill = ref(null);        // program drilled into
    const seasonDrill = ref(null);  // season drilled into
    const fsSel = ref(null);        // frontspace listbox model
    const draft = ref(null);        // in-progress selection

    const selId = computed(() => draft.value ? draft.value._id : null);
    const pick = (sel) => { draft.value = sel; };

    const switchType = (k) => { type.value = k; q.value=""; drill.value=null; seasonDrill.value=null; fsSel.value=null; draft.value=null; };
    const enterDrill = (p) => { drill.value = p; seasonDrill.value=null; q.value=""; draft.value=null; };
    const exitDrill  = () => { drill.value = null; seasonDrill.value=null; q.value=""; draft.value=null; };
    const enterSeason = (s) => { seasonDrill.value = s; q.value=""; draft.value=null; };
    const exitSeason  = () => { seasonDrill.value = null; q.value=""; draft.value=null; };

    const matchTitle = (list) => list.filter(x => x.title.toLowerCase().includes(q.value.toLowerCase()));
    const matchPrograms = () => {
      const t = q.value.toLowerCase();
      return PROGRAMS.filter(p => p.title.toLowerCase().includes(t) || p.id.toLowerCase().includes(t) || p.ck.toLowerCase().includes(t));
    };

    // which sub-view of the search is active
    const view = computed(() => {
      if (type.value === "service" || type.value === "channel") return "title";
      if (type.value === "frontspace") return "frontspace";
      if (!drill.value) return "programs";
      if (!seasonDrill.value) return "children";
      return "clips";
    });

    const titleList = computed(() => matchTitle(type.value === "service" ? SERVICES : CHANNELS));
    const programList = computed(() => matchPrograms());
    const childList = computed(() => {
      if (!drill.value) return [];
      const t = q.value.toLowerCase();
      const kids = [
        ...drill.value.seasons.map(s => ({ kind:"season", item:s })),
        ...drill.value.clips.map(c => ({ kind:"clip", item:c })),
      ];
      return kids.filter(({item}) => item.title.toLowerCase().includes(t) || item.id.toLowerCase().includes(t));
    });
    const clipList = computed(() => {
      if (!drill.value || !seasonDrill.value) return [];
      const t = q.value.toLowerCase();
      return drill.value.clips.filter(c => c.title.toLowerCase().includes(t) || c.id.toLowerCase().includes(t));
    });

    /* --- modal navigation --- */
    const reset = () => {
      step.value = 1; mode.value = "wizard"; switchType("catalog"); type.value = "catalog";
      Object.assign(form, { title:"", pubTitle:"", subtitle:"", desc:"", destKind:"", externalUrl:"", ctaLabel:"Watch now", selection:null, visuals:[] });
    };
    const openModal = () => { reset(); open.value = true; };
    const closeModal = () => { open.value = false; };

    const openSearch = () => { draft.value = form.selection; switchType("catalog"); mode.value = "search"; };
    const backToWizard = () => { mode.value = "wizard"; };
    const confirmSearch = () => { form.selection = draft.value; mode.value = "wizard"; };

    // frontspace listbox → live draft
    watch(fsSel, (fs) => { if (fs) draft.value = makeSelection("frontspace", fs); });

    const dialogWidth = computed(() => mode.value === "search" ? "840px" : "720px");

    const canNext = computed(() => {
      if (step.value !== 1) return true;
      if (form.title.trim() === "" || form.destKind === "") return false;
      if (form.destKind === "external" && form.externalUrl.trim() === "") return false;
      if (form.destKind === "internal" && !form.selection) return false;
      return true;
    });

    const reviewDest = computed(() => {
      if (form.destKind === "external")
        return { typeLabel:"External URL", title: form.externalUrl || "—", sub: form.ctaLabel ? `CTA: ${form.ctaLabel}` : "Opens outside the app" };
      if (form.destKind === "internal") return form.selection;
      return null;
    });

    /* --- visuals step --- */
    const availableTypes = computed(() => VISUAL_TYPES.filter(t => !form.visuals.some(v => v.key === t.key)));
    const addVisual = (key) => {
      if (!key) return;
      const t = VISUAL_TYPES.find(x => x.key === key);
      if (t && !form.visuals.some(v => v.key === key)) form.visuals.push({ ...t, file:null, fileName:"", alt:"", _drag:false });
    };
    const removeVisual = (i) => form.visuals.splice(i, 1);
    const readImg = (file, i) => {
      if (!file || !file.type.startsWith("image/")) return;
      const r = new FileReader();
      r.onload = e => { form.visuals[i].file = e.target.result; form.visuals[i].fileName = file.name; form.visuals[i]._drag = false; };
      r.readAsDataURL(file);
    };
    const onFile = (i, e) => { readImg(e.target.files[0], i); e.target.value = ""; };
    const onDrop = (i, e) => { form.visuals[i]._drag = false; readImg(e.dataTransfer.files[0], i); };
    const canCreate = computed(() => form.visuals.length > 0 && form.visuals.every(v => v.file && v.alt.trim() !== ""));

    const create = () => {
      closeModal();
      const d = new Date().toLocaleDateString("en-GB");
      editorialRows.value = [{ id: Date.now(), title: form.title || "Untitled content", updated: d }, ...editorialRows.value];
      toast.add({ severity:"success", summary:"New editorial content successfully added", detail:"This Editorial content is now available", life: 3000 });
    };

    const pickRedir = (k) => { form.destKind = k; if (k === "internal" && !form.selection) openSearch(); };

    return {
      RAIL, D_TABS, PILL, REDIR_OPTIONS, FRONTSPACES,
      open, step, mode, editorialRows, form,
      type, q, drill, seasonDrill, fsSel, draft, selId,
      view, titleList, programList, childList, clipList,
      switchType, enterDrill, exitDrill, enterSeason, exitSeason, pick,
      makeSelection,
      openModal, closeModal, openSearch, backToWizard, confirmSearch,
      dialogWidth, canNext, reviewDest, create, pickRedir,
      VISUAL_TYPES, availableTypes, addVisual, removeVisual, onFile, onDrop, canCreate,
    };
  },

          </div>
          <div class="field" style="margin-bottom:0">
            <div class="label-row"><label>CTA's label <span style="color:var(--fg-tertiary);font-weight:400">(optional)</span></label></div>
            <InputText v-model="form.ctaLabel" placeholder="e.g. Watch now" class="full" />
          </div>
        </div>

        <div v-if="form.destKind==='internal'" style="margin-top:18px;padding-top:16px;border-top:1px solid var(--stroke-bright)">
          <div v-if="form.selection" class="chosen">
            <Poster v-if="form.selection.poster" :poster="form.selection.poster" :size="34" />
            <span v-else class="ic-box" style="width:40px;height:40px;background:#fff;color:var(--accent-600)"><i class="pi pi-link"></i></span>
            <div style="min-width:0">
              <div class="meta-type">{{ form.selection.typeLabel }}</div>
              <div class="t" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ form.selection.title }}</div>
              <div class="sub">{{ form.selection.sub }}<template v-if="form.selection.status"> · {{ form.selection.status }}</template></div>
            </div>
            <div class="spacer"></div>
            <Button label="Change" severity="secondary" outlined size="small" @click="openSearch" />
          </div>
          <Button v-else label="Choose internal destination" icon="pi pi-search" severity="secondary" outlined
                  style="width:100%;justify-content:center;height:48px" @click="openSearch" />
          <div v-if="!form.selection" style="display:flex;align-items:center;gap:7px;margin-top:8px;font-size:12.5px;color:var(--red-stroke)">
            <i class="pi pi-info-circle" style="font-size:13px"></i> Select a destination to continue.
          </div>
          <div class="field" style="margin-top:16px;margin-bottom:0">
            <div class="label-row"><label>CTA's label <span style="color:var(--fg-tertiary);font-weight:400">(optional)</span></label></div>
            <InputText v-model="form.ctaLabel" placeholder="e.g. Watch now" class="full" />
          </div>
        </div>
      </div>

      <!-- Step 2 : Editorial content's visuals -->
      <div v-else>
        <div class="field" style="margin-bottom:16px">
          <div class="label-row"><label>Select a visual</label></div>
          <Select :modelValue="null" @update:modelValue="addVisual" :options="availableTypes" optionLabel="label" optionValue="key"
                  placeholder="Select a visual type" class="full" :disabled="availableTypes.length===0" />
        </div>

        <div v-if="form.visuals.length" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px">
          <span v-for="(v,i) in form.visuals" :key="'chip'+v.key" class="visual-chip">{{ v.label }}
            <button type="button" @click="removeVisual(i)" aria-label="Remove"><i class="pi pi-times"></i></button></span>
        </div>

        <div v-for="(v,i) in form.visuals" :key="'blk'+v.key" class="visual-block">
          <div style="font-weight:700;font-size:14px">{{ v.label }}</div>
          <div style="font-size:12px;color:var(--fg-tertiary);margin-top:2px">{{ v.spec }}</div>
          <div class="dropzone" :class="{ over: v._drag, filled: v.file }"
               @dragover.prevent="v._drag=true" @dragleave.prevent="v._drag=false" @drop.prevent="onDrop(i,$event)">
            <template v-if="v.file">
              <img :src="v.file" class="dz-preview" :alt="v.alt" />
              <button type="button" class="dz-remove" @click="v.file=null;v.fileName=''" aria-label="Remove image"><i class="pi pi-times"></i></button>
            </template>
            <template v-else>
              <label class="dz-btn"><i class="pi pi-plus"></i> Upload a file<input type="file" accept="image/*" hidden @change="onFile(i,$event)" /></label>
              <div class="dz-hint">or drag and drop it</div>
            </template>
          </div>
          <div class="field" style="margin-top:14px;margin-bottom:0">
            <div class="label-row"><label>Alternative text<span class="req">*</span></label></div>
            <InputText v-model="v.alt" placeholder="Content text" class="full" />
          </div>
        </div>

        <div v-if="!form.visuals.length" class="sv-empty" style="padding:36px 20px">
          <div class="ic-circle"><i class="pi pi-image"></i></div>
          <div class="et">No visual yet</div>
          <div class="ed">Select a visual type above to add an image for that format.</div>
        </div>
      </div>
    </div>

    <!-- footer -->
    <template #footer>
      <div v-if="mode==='search'" style="display:flex;align-items:center;gap:10px;width:100%">
        <Button label="Cancel" text severity="secondary" @click="backToWizard" />
        <div style="flex:1"></div>
        <div v-if="draft" style="font-size:13px;color:var(--fg-secondary);margin-right:4px"><strong style="color:var(--fg-primary)">{{ draft.typeLabel }}</strong> selected</div>
        <Button label="Select destination" icon="pi pi-check" :disabled="!draft" @click="confirmSearch" />
      </div>
      <div v-else style="display:flex;align-items:center;gap:10px;width:100%">
        <Button :label="step===1 ? 'Cancel' : 'Back'" :icon="step===1 ? '' : 'pi pi-chevron-left'" text severity="secondary"
                @click="step===1 ? closeModal() : step--" />
        <div style="flex:1"></div>
        <div class="stepper">
          <div class="node" :class="{ active: step===1, done: step>1 }"><span class="dot"><i v-if="step>1" class="pi pi-check" style="font-size:11px"></i><template v-else>1</template></span><span class="lbl">Details</span></div>
          <span class="bar"></span>
          <div class="node" :class="{ active: step===2 }"><span class="dot">2</span><span class="lbl">Visuals</span></div>
        </div>
        <div style="flex:1"></div>
        <Button v-if="step<2" label="Next" icon="pi pi-arrow-right" iconPos="right" :disabled="!canNext" @click="step++" />
        <Button v-else label="Create" icon="pi pi-check" :disabled="!canCreate" @click="create" />
      </div>
    </template>
  </Dialog>

  <Toast position="bottom-center" />
</div>
`
};

/* ---------- bootstrap ---------- */
const app = createApp(App);
app.use(PrimeVue.Config, {
  theme: { preset: PrimeUIX.Themes.Aura, options: { darkModeSelector: ".__never_dark__" } }
});
app.use(PrimeVue.ToastService);

// register the components we use
const C = ["Button","InputText","Textarea","IconField","InputIcon","Dialog","DataTable","Column",
           "RadioButton","SelectButton","Select","Listbox","Tag","Toast"];
C.forEach(n => app.component(n, PrimeVue[n]));

app.mount("#app");
</script>
</body>
</html>
